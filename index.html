function saveRecord(action,message,detail=''){
  const kind=currentDetailContext.kind||'default';
  const title=currentDetailContext.title||document.querySelector('.page-view h1')?.textContent||'工作台操作';
  const rec={id:Date.now(),time:new Date().toLocaleString('zh-CN',{hour12:false}),kind,title,action,message,detail,table:storageLabels[kind]||storageLabels.default,dest:storageDest[kind]||storageDest.default,recordId:recordId(kind,title)};
  const list=readRecords();list.unshift(rec);writeRecords(list);refreshStorageView();return rec;
}
