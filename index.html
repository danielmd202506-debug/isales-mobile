<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iSales Mobile</title>
  <style>
    :root{--primary:#0a59f7;--cyan:#00b8ff;--green:#00b578;--orange:#ff8f1f;--red:#ff3141;--bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#687386;--line:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#dce8ff,#f3f6fb);display:grid;place-items:center;color:var(--text)}
    .phone{position:relative;width:min(430px,100vw);height:min(932px,100vh);background:var(--bg);overflow:hidden;box-shadow:0 22px 70px rgba(15,23,42,.28)}.app{height:100%;display:grid;grid-template-rows:auto 1fr auto}.safe{height:env(safe-area-inset-top);background:#fff}
    .top{background:#fff;border-bottom:1px solid var(--line)}.nav{height:54px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:0 12px}.nav h1{margin:0;text-align:center;font-size:17px}.nav button{border:0;background:transparent;font-size:22px}
    .search{display:flex;gap:8px;padding:0 12px 10px}.search input{flex:1;height:38px;border:0;border-radius:12px;background:#f1f4f9;padding:0 12px}.search button{width:42px;border:0;border-radius:12px;background:#eaf2ff;color:var(--primary);font-weight:900}
    .content{overflow:auto;padding:12px 12px 96px}.banner{border-radius:18px;padding:16px;background:linear-gradient(135deg,#0a59f7,#00b8ff);color:#fff;margin-bottom:12px}.banner h2{margin:0;font-size:20px}.banner p{margin:6px 0 0;opacity:.88;font-size:13px}.status{display:flex;justify-content:space-between;align-items:center;background:#eaf4ff;color:#1158a5;border:1px solid #cfe7ff;border-radius:12px;padding:9px 12px;font-size:12px;margin-bottom:10px}
    .card{background:var(--card);border:1px solid rgba(229,231,235,.86);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(15,23,42,.04)}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.head h2{font-size:16px;margin:0}.head a{color:var(--primary);font-size:12px;text-decoration:none}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:#f7faff;border-radius:13px;padding:10px}.metric span{display:block;color:var(--muted);font-size:11px}.metric b{display:block;margin-top:5px;font-size:20px}.metric em{display:block;margin-top:3px;font-style:normal;font-size:11px;color:var(--green)}
    .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.q{display:grid;justify-items:center;gap:6px;font-size:12px;color:#374151}.q i{width:42px;height:42px;border-radius:15px;background:#eef4ff;color:var(--primary);display:grid;place-items:center;font-style:normal;font-size:22px}
    .item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.ico{width:38px;height:38px;border-radius:13px;background:#eef4ff;color:var(--primary);display:grid;place-items:center}.title{font-size:14px;font-weight:800}.sub{font-size:12px;color:var(--muted);margin-top:2px}.badge{min-width:22px;height:22px;border-radius:999px;background:var(--red);color:#fff;display:grid;place-items:center;font-size:12px;padding:0 6px}.tag{display:inline-flex;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:800;background:#eef4ff;color:var(--primary)}.tag.green{background:#e8fff6;color:#008f62}.tag.warn{background:#fff6e8;color:#b65c00}.tag.red{background:#fff1f1;color:#d91515}
    .project{background:#fbfdff;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:9px}.project-top{display:flex;justify-content:space-between;gap:8px}.project h3{margin:0;font-size:15px}.progress{height:7px;border-radius:8px;background:#edf1f7;overflow:hidden;margin:10px 0 5px}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--cyan))}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.tile{border:1px solid var(--line);background:#fff;border-radius:14px;padding:13px}.tile i{font-style:normal;font-size:24px}.tile b{display:block;margin-top:8px;font-size:14px}.tile span{display:block;margin-top:4px;color:var(--muted);font-size:12px}
    .form{display:grid;gap:11px}.field{display:grid;gap:6px}.field label{font-size:13px;font-weight:800}.input,.textarea{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 12px;font:inherit}.textarea{min-height:76px}.btn{height:42px;border:0;border-radius:13px;background:var(--primary);color:#fff;font-weight:900;font-size:15px}.btn.ghost{background:#eef4ff;color:var(--primary)}.btn.warn{background:#fff6e8;color:#b65c00}
    .tabs{height:68px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}.tab{border:0;background:#fff;color:#6b7280;display:grid;justify-items:center;align-content:center;gap:3px;font-size:11px}.tab i{font-style:normal;font-size:22px}.tab.active{color:var(--primary);font-weight:900}.fab{position:absolute;right:18px;bottom:82px;width:58px;height:58px;border:0;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;font-size:28px;box-shadow:0 12px 28px rgba(10,89,247,.35);z-index:4}
    [data-action]{cursor:pointer}.item:active,.q:active,.tile:active,.project:active{transform:scale(.985);opacity:.9}.toast{position:absolute;left:50%;bottom:92px;transform:translateX(-50%);max-width:86%;padding:10px 14px;border-radius:999px;background:rgba(17,24,39,.92);color:#fff;font-size:13px;z-index:20}.mask{position:absolute;inset:0;background:rgba(15,23,42,.42);z-index:18;display:grid;align-items:end}.sheet{background:#fff;border-radius:18px 18px 0 0;padding:16px 14px 22px;max-height:72vh;overflow:auto}.sheet h3{margin:0 0 8px;font-size:18px}.sheet p{margin:0 0 12px;color:var(--muted);font-size:13px}.rows{display:grid;gap:8px}.rows div{display:flex;justify-content:space-between;background:#f8fafc;border-radius:10px;padding:9px 10px;font-size:13px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    @media(max-width:360px){.metrics{grid-template-columns:repeat(2,1fr)}.quick{gap:6px}.q i{width:38px;height:38px}.phone{height:100vh}}
  </style>
</head>
<body>
<div class="phone">
  <div class="app">
    <div class="top"><div class="safe"></div><div class="nav"><button id="back">‹</button><h1 id="pageTitle">工作台</h1><button id="more">⋯</button></div><div class="search"><input placeholder="搜索项目 / 客户 / 合同 / 问题单"><button data-action="search">⌕</button></div></div>
    <main class="content" id="content"></main>
    <nav class="tabs" id="tabs"><button class="tab active" data-tab="home"><i>⌂</i><span>工作台</span></button><button class="tab" data-tab="customer"><i>♙</i><span>客户</span></button><button class="tab" data-tab="project"><i>▣</i><span>项目</span></button><button class="tab" data-tab="issue"><i>!</i><span>问题</span></button><button class="tab" data-tab="doc"><i>◇</i><span>资料</span></button></nav>
  </div>
  <button class="fab" id="fab">＋</button>
</div>
<script>
const content=document.getElementById('content'),pageTitle=document.getElementById('pageTitle');
const pages={
home:{title:'工作台',html:`<div class="banner"><h2>iSales Mobile</h2><p>一线铁三角现场协同、项目交付、客户拜访与问题闭环</p></div><div class="status"><span>离线可用 · 待同步 5 条</span><span>在线</span></div><section class="card"><div class="head"><h2>今日指标</h2><a data-action="detail" data-title="今日指标">详情</a></div><div class="metrics"><div class="metric"><span>在管项目</span><b>24</b><em>+3 本周</em></div><div class="metric"><span>今日拜访</span><b>8</b><em>2 待签到</em></div><div class="metric"><span>待办审批</span><b>16</b><em style="color:#ff3141">高 4</em></div><div class="metric"><span>问题闭环率</span><b>87%</b><em>+5pp</em></div><div class="metric"><span>验收待签</span><b>6</b><em style="color:#ff8f1f">需跟进</em></div><div class="metric"><span>回款风险</span><b>3</b><em style="color:#ff3141">红色</em></div></div></section><section class="card"><div class="head"><h2>快捷入口</h2><a>常用</a></div><div class="quick">${quick('签到','⌖','checkin')}${quick('拜访','♙','visit')}${quick('问题','!','newIssue')}${quick('验收','☑','acceptance')}${quick('日报','▤','daily')}${quick('报价','¥','quote')}${quick('订单','▦','order')}${quick('资料','◇','docs')}</div></section><section class="card"><div class="head"><h2>重点项目</h2><a data-action="switch" data-target="project">全部</a></div>${projectCard('Riyadh 5G Core 交付','安装/调测','82%','S级','green')}${projectCard('Dubai Enterprise Cloud','到货/验收','64%','A级','warn')}${projectCard('Jeddah Campus Network','客户变更','51%','高风险','red')}</section><section class="card"><div class="head"><h2>铁三角待办</h2><a>16</a></div>${item('客户拜访纪要待提交','Riyadh Telecom，含 2 条商机线索','2','♙')}${item('验收单待客户签字','Dubai Enterprise Cloud，现场签名','1','☑')}${item('高优先级问题单','调测失败，需服务经理确认','4','!')}</section>`},
customer:{title:'客户拜访',html:`<section class="card"><div class="head"><h2>今日拜访计划</h2><a data-action="visit">新建</a></div>${item('Riyadh Telecom CTO','14:00，GPS+WiFi 签到','', '♙')}${item('Saudi Energy IT部','16:30，商机跟进','', '♙')}${item('Dubai Gov Cloud','远程会议，验收沟通','', '◷')}</section><section class="card"><div class="head"><h2>客户资料</h2><a>CRM同步</a></div>${item('Riyadh Telecom','联系人 12 / 历史订单 8 / 服务记录 24','', '▦')}${item('Dubai Gov Cloud','合同 3 / 在交付项目 2','', '▦')}</section><section class="card"><div class="head"><h2>拜访记录</h2></div><div class="form"><div class="field"><label>拜访主题</label><input class="input" value="5G Core 扩容沟通"></div><div class="field"><label>纪要</label><textarea class="textarea">客户关注验收周期与扩容报价，需补充方案。</textarea></div><button class="btn" data-action="submitVisit">提交纪要</button></div></section>`},
project:{title:'项目交付',html:`<section class="card"><div class="head"><h2>我的项目</h2><a>筛选</a></div>${projectCard('Riyadh 5G Core 交付','安装/调测','82%','S级','green')}${projectCard('Dubai Enterprise Cloud','到货/验收','64%','A级','warn')}${projectCard('South Africa Managed Service','回款/关闭','91%','B级','green')}</section><section class="card"><div class="head"><h2>现场任务</h2><a>阶段</a></div>${tileGrid([['开始任务','执行结果/照片上传','▶','startTask'],['现场验收','电子签名/归档','☑','acceptance'],['发货跟踪','物流/签收确认','▦','order'],['日报生成','自动汇总可编辑','▤','daily']])}</section>`},
issue:{title:'问题闭环',html:`<section class="card"><div class="head"><h2>问题概览</h2><a>风险矩阵</a></div><div class="metrics"><div class="metric"><span>待处理</span><b>12</b><em style="color:#ff3141">高 3</em></div><div class="metric"><span>处理中</span><b>18</b><em>正常</em></div><div class="metric"><span>待确认</span><b>6</b><em style="color:#ff8f1f">客户确认</em></div></div></section><section class="card"><div class="head"><h2>问题单</h2><a data-action="newIssue">新建</a></div>${item('安装规范偏差','高优先级，已派给工程师','3','!')}${item('客户需求变更','影响范围待评估','1','✎')}${item('软件版本兼容','服务经理处理中','', '⚙')}</section><section class="card"><div class="head"><h2>新建问题</h2></div><div class="form"><div class="field"><label>问题类型</label><input class="input" value="安装 / 调测"></div><div class="field"><label>描述</label><textarea class="textarea">现场发现配置与客户需求不一致，需评估变更。</textarea></div><button class="btn" data-action="submitIssue">提交并派单</button></div></section>`},
doc:{title:'资料中心',html:`<section class="card"><div class="head"><h2>项目文档</h2><a>离线缓存</a></div>${item('合同与 PO 信息','最新版，权限可见','', '◇')}${item('实施方案 / 图纸','已缓存 18 个文件','', '▤')}${item('验收标准与测试报告','待补 2 项','2', '☑')}</section><section class="card"><div class="head"><h2>日报 / 周报</h2><a data-action="daily">生成</a></div>${item('今日日报','自动填充任务、问题、风险','', '▤')}${item('本周周报','汇总 5 天现场数据','', '▤')}</section><section class="card"><div class="head"><h2>安全与同步</h2></div>${item('本地 AES-256 加密','离线数据安全存储','', '⚙')}${item('同步日志','5 条待同步，0 条冲突','5', '⟳')}</section>`}
};
function quick(t,i,a){return `<div class="q" data-action="${a}"><i>${i}</i><span>${t}</span></div>`}
function item(t,s,b,i){return `<div class="item" data-action="detail" data-title="${t}" data-sub="${s}"><div class="ico">${i}</div><div><div class="title">${t}</div><div class="sub">${s}</div></div>${b?`<div class="badge">${b}</div>`:'›'}</div>`}
function projectCard(n,stage,p,tag,color){return `<div class="project" data-action="project" data-title="${n}" data-sub="${stage} · 当前进度 ${p}"><div class="project-top"><h3>${n}</h3><span class="tag ${color}">${tag}</span></div><div class="sub">${stage} · 关键里程碑 3 天后到期</div><div class="progress"><i style="width:${p}"></i></div><div class="sub">整体进度 ${p}</div></div>`}
function tileGrid(arr){return `<div class="grid2">${arr.map(x=>`<div class="tile" data-action="${x[3]}" data-title="${x[0]}" data-sub="${x[1]}"><i>${x[2]}</i><b>${x[0]}</b><span>${x[1]}</span></div>`).join('')}</div>`}
function render(tab){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));pageTitle.textContent=pages[tab].title;content.innerHTML=pages[tab].html}
function toast(msg){document.querySelector('.toast')?.remove();const el=document.createElement('div');el.className='toast';el.textContent=msg;document.querySelector('.phone').appendChild(el);setTimeout(()=>el.remove(),1800)}
function sheet(title,sub,rows=[['来源','iSales / CRM'],['状态','已同步'],['离线','可用'],['下一步','继续办理']]){document.querySelector('.mask')?.remove();const m=document.createElement('div');m.className='mask';m.innerHTML=`<div class="sheet"><h3>${title}</h3><p>${sub||'查看详情并继续处理。'}</p><div class="rows">${rows.map(r=>`<div><span>${r[0]}</span><b>${r[1]}</b></div>`).join('')}</div><div class="actions"><button class="btn ghost" data-action="close">稍后</button><button class="btn" data-action="go">继续办理</button></div></div>`;document.querySelector('.phone').appendChild(m)}
document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)render(b.dataset.tab)});
content.addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(!el)return;const a=el.dataset.action;if(a==='switch'){render(el.dataset.target);return}if(['checkin','visit','newIssue','acceptance','daily','quote','order','docs','startTask'].includes(a)){sheet(el.dataset.title||el.textContent.trim(),el.dataset.sub||'移动端流程入口',[['操作','可离线'],['记录','自动留痕'],['同步','联网自动回传']]);return}if(a==='submitVisit'){toast('拜访纪要已提交并关联客户/商机');return}if(a==='submitIssue'){toast('问题单已创建，已派给服务经理');return}if(a==='detail'||a==='project'){sheet(el.dataset.title,el.dataset.sub);return}if(a==='search'){toast('支持项目、客户、合同、订单、问题单搜索')}});
document.querySelector('.phone').addEventListener('click',e=>{const a=e.target.closest('[data-action]')?.dataset.action;if(a==='close'){document.querySelector('.mask')?.remove()}if(a==='go'){document.querySelector('.mask')?.remove();toast('已进入办理流程')}if(e.target.classList.contains('mask'))e.target.remove()});
document.getElementById('fab').addEventListener('click',()=>sheet('快捷新建','选择要新建的现场记录',[['客户拜访','GPS 签到'],['问题单','拍照/语音'],['验收单','电子签名'],['日报','自动生成']]));
document.getElementById('more').addEventListener('click',()=>sheet('全局设置','账号、安全、离线与同步',[['登录方式','SSO / 生物识别'],['本地加密','AES-256'],['待同步','5 条'],['版本','v1.0.0']]));
document.getElementById('back').addEventListener('click',()=>toast('当前为移动端原型首页层级'));
render('home');
</script>
</body>
</html>
