<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iSales Mobile</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root{--primary:#0066CC;--primary-light:#E6F0FF;--primary-dark:#004C99;--cyan:#4da3ff;--green:#00B42A;--orange:#FF7D00;--red:#F53F3F;--bg:#F2F3F5;--card:#fff;--text:#1D2129;--muted:#4E5969;--tertiary:#86909C;--line:#E5E6EB;font-family:"Huawei Sans","PingFang SC",sans-serif}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#dce8ff,#f3f6fb);display:grid;place-items:center;color:var(--text)}
    .phone{position:relative;width:min(430px,100vw);height:min(932px,100vh);background:var(--bg);overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12)}.app{height:100%;display:grid;grid-template-rows:auto 1fr auto}.safe{height:env(safe-area-inset-top);background:#fff}.page-view{position:absolute;inset:0;background:var(--bg);z-index:12;display:grid;grid-template-rows:auto 1fr auto}.page-view .content{padding-bottom:16px}
    .top{background:#fff;border-bottom:1px solid var(--line)}.nav{height:48px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:0 16px}.nav h1{margin:0;text-align:center;font-size:18px;font-weight:500}.nav button{border:0;background:transparent;font-size:22px;color:var(--text)}.avatar-btn{width:34px;height:34px;border-radius:50%;border:0;padding:0;background:url("https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=96&h=96&q=80") center/cover;box-shadow:0 2px 8px rgba(0,102,204,.22);outline:2px solid #fff}.bottom-actions{display:flex;gap:8px;padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--line);box-shadow:0 -2px 8px rgba(0,0,0,.04);overflow:hidden}.bottom-actions button{height:44px;min-width:0;flex:1;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bottom-actions button.primary{background:var(--primary);border-color:var(--primary);color:#fff}.bottom-actions button.more{flex:0 0 44px;font-size:20px}
    .search{display:flex;gap:8px;padding:0 16px 12px}.search input{flex:1;height:40px;border:1px solid transparent;border-radius:8px;background:#F7F8FA;padding:0 12px;font-size:14px}.search button{width:44px;border:0;border-radius:8px;background:var(--primary-light);color:var(--primary);font-weight:600}
    .content{overflow:auto;padding:16px 16px 88px}.banner{border-radius:12px;padding:16px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;margin-bottom:12px}.banner h2{margin:0;font-size:24px;font-weight:600}.banner p{margin:6px 0 0;opacity:.88;font-size:14px}.status{display:flex;justify-content:space-between;align-items:center;background:var(--primary-light);color:var(--primary-dark);border:1px solid #C7DEFF;border-radius:12px;padding:9px 12px;font-size:12px;margin-bottom:10px}
    .card{background:var(--card);border:0;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.head h2{font-size:20px;font-weight:600;margin:0}.head a{color:var(--primary);font-size:14px;text-decoration:none}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:#F7F8FA;border-radius:8px;padding:10px}.metric span{display:block;color:var(--tertiary);font-size:12px}.metric b{display:block;margin-top:5px;font-size:20px;font-weight:600}.metric em{display:block;margin-top:3px;font-style:normal;font-size:12px;color:var(--green)}
    .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.q{display:grid;justify-items:center;gap:6px;font-size:12px;color:var(--text)}.q i{width:44px;height:44px;border-radius:12px;background:var(--primary-light);color:var(--primary);display:grid;place-items:center;font-style:normal;font-size:22px}
    .item{min-height:56px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.ico{width:40px;height:40px;border-radius:12px;background:var(--primary-light);color:var(--primary);display:grid;place-items:center;font-size:20px}.title{font-size:16px;font-weight:400}.sub{font-size:14px;color:var(--muted);margin-top:2px}.badge{min-width:22px;height:22px;border-radius:999px;background:var(--red);color:#fff;display:grid;place-items:center;font-size:12px;padding:0 6px}.tag{display:inline-flex;border-radius:999px;padding:2px 7px;font-size:12px;font-weight:400;background:var(--primary-light);color:var(--primary)}.tag.green{background:#E8FFF0;color:var(--green)}.tag.warn{background:#FFF3E6;color:var(--orange)}.tag.red{background:#FFF0F0;color:var(--red)}
    .project{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:8px}.project-top{display:flex;justify-content:space-between;gap:8px}.project h3{margin:0;font-size:18px;font-weight:500}.progress{height:6px;border-radius:8px;background:#EDF1F7;overflow:hidden;margin:10px 0 5px}.progress i{display:block;height:100%;background:var(--primary)}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.tile{border:1px solid var(--line);background:#fff;border-radius:12px;padding:16px}.tile i{font-style:normal;font-size:24px;color:var(--primary)}.tile b{display:block;margin-top:8px;font-size:16px;font-weight:400}.tile span{display:block;margin-top:4px;color:var(--muted);font-size:14px}
    .form{display:grid;gap:16px}.field{display:grid;gap:8px}.field label{font-size:14px;font-weight:500}.input,.textarea{border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px 12px;font:inherit;font-size:16px}.textarea{min-height:76px}.btn{height:44px;border:0;border-radius:8px;background:var(--primary);color:#fff;font-weight:600;font-size:16px}.btn.ghost{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.warn{background:#FFF3E6;color:var(--orange)}
    .tabs{height:56px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}.tab{border:0;background:#fff;color:var(--tertiary);display:grid;justify-items:center;align-content:center;gap:2px;font-size:12px}.tab i{font-style:normal;font-size:20px}.tab.active{color:var(--primary);font-weight:600}.fab{position:absolute;right:18px;bottom:74px;width:56px;height:56px;border:0;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:4}
    [data-action]{cursor:pointer}.item:active,.q:active,.tile:active,.project:active{opacity:.9}.toast{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);max-width:86%;padding:10px 14px;border-radius:999px;background:rgba(29,33,41,.92);color:#fff;font-size:14px;z-index:30}.mask{position:absolute;inset:0;background:rgba(29,33,41,.42);z-index:18;display:grid;place-items:center;padding:22px}.mask.menu{background:rgba(29,33,41,.12);display:block;padding:0}.sheet{background:#fff;border-radius:16px;padding:16px;max-height:72vh;overflow:auto;width:100%}.sheet h3{margin:0 0 8px;font-size:20px;font-weight:600}.sheet p{margin:0 0 12px;color:var(--muted);font-size:14px}.float-menu{position:absolute;right:16px;width:238px;background:#fff;border-radius:12px;padding:8px;box-shadow:0 4px 16px rgba(0,0,0,.16);border:1px solid var(--line)}.float-menu.top{top:calc(env(safe-area-inset-top) + 52px)}.float-menu.bottom{bottom:138px}.float-menu.actionbar{bottom:74px}.float-menu h3{margin:4px 8px 8px;font-size:15px}.rows{display:grid;gap:8px}.rows div{display:flex;justify-content:space-between;background:#F7F8FA;border-radius:8px;padding:9px 10px;font-size:14px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}.actions.three{grid-template-columns:1fr 1fr 1fr}.detail-section{margin-top:12px}.detail-section h4{margin:0 0 8px;font-size:15px;font-weight:600}.timeline{display:grid;gap:8px}.timeline div{display:grid;grid-template-columns:18px 1fr;gap:8px;align-items:start}.timeline i{width:10px;height:10px;border-radius:50%;background:var(--primary);margin-top:5px}.timeline span{font-size:13px;color:var(--muted)}.mini-btn{height:36px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:500}.mini-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}.action-list{display:grid;gap:4px}.action-list button{height:42px;border:0;border-radius:8px;background:#fff;color:var(--text);font-size:15px;text-align:left;padding:0 10px}.action-list button:active{background:#F7F8FA}.confirm-box{background:#fff;border-radius:16px;padding:18px;width:100%;max-width:340px}.confirm-box h3{margin:0 0 8px;font-size:20px}
    @media(max-width:360px){.metrics{grid-template-columns:repeat(2,1fr)}.quick{gap:6px}.q i{width:38px;height:38px}.phone{height:100vh}}
  </style>
</head>
<body>
<div class="phone">
  <div class="app">
    <div class="top"><div class="safe"></div><div class="nav"><button id="profile" class="avatar-btn" aria-label="个人中心"></button><h1 id="pageTitle">工作台</h1><button id="more">⋯</button></div><div class="search"><input placeholder="搜索项目 / 客户 / 合同 / 问题单"><button data-action="search">⌕</button></div></div>
    <main class="content" id="content"></main>
    <nav class="tabs" id="tabs"><button class="tab active" data-tab="home"><i class="ri-dashboard-line"></i><span>工作台</span></button><button class="tab" data-tab="customer"><i class="ri-user-voice-line"></i><span>客户</span></button><button class="tab" data-tab="project"><i class="ri-briefcase-4-line"></i><span>项目</span></button><button class="tab" data-tab="issue"><i class="ri-error-warning-line"></i><span>问题</span></button><button class="tab" data-tab="doc"><i class="ri-folder-3-line"></i><span>资料</span></button></nav>
  </div>
  <button class="fab" id="fab"><i class="ri-add-line"></i></button>
</div>
<script>
const content=document.getElementById('content'),pageTitle=document.getElementById('pageTitle');
const pages={
home:{title:'工作台',html:`<div class="banner"><h2>iSales Mobile</h2><p>一线铁三角现场协同、项目交付、客户拜访与问题闭环</p></div><div class="status"><span>离线可用 · 待同步 5 条</span><span>在线</span></div><section class="card"><div class="head"><h2>今日指标</h2><a data-action="detail" data-title="今日指标">详情</a></div><div class="metrics"><div class="metric"><span>在管项目</span><b>24</b><em>+3 本周</em></div><div class="metric"><span>今日拜访</span><b>8</b><em>2 待签到</em></div><div class="metric"><span>待办审批</span><b>16</b><em style="color:#ff3141">高 4</em></div><div class="metric"><span>问题闭环率</span><b>87%</b><em>+5pp</em></div><div class="metric"><span>验收待签</span><b>6</b><em style="color:#ff8f1f">需跟进</em></div><div class="metric"><span>回款风险</span><b>3</b><em style="color:#ff3141">红色</em></div></div></section><section class="card"><div class="head"><h2>快捷入口</h2><a>常用</a></div><div class="quick">${quick('签到','ri-map-pin-user-line','checkin')}${quick('拜访','ri-user-voice-line','visit')}${quick('问题','ri-error-warning-line','newIssue')}${quick('验收','ri-checkbox-circle-line','acceptance')}${quick('日报','ri-file-list-3-line','daily')}${quick('报价','ri-money-cny-circle-line','quote')}${quick('订单','ri-shopping-bag-3-line','order')}${quick('资料','ri-folder-3-line','docs')}</div></section><section class="card"><div class="head"><h2>重点项目</h2><a data-action="switch" data-target="project">全部</a></div>${projectCard('Riyadh 5G Core 交付','安装/调测','82%','S级','green')}${projectCard('Dubai Enterprise Cloud','到货/验收','64%','A级','warn')}${projectCard('Jeddah Campus Network','客户变更','51%','高风险','red')}</section><section class="card"><div class="head"><h2>铁三角待办</h2><a>16</a></div>${item('客户拜访纪要待提交','Riyadh Telecom，含 2 条商机线索','2','ri-user-voice-line')}${item('验收单待客户签字','Dubai Enterprise Cloud，现场签名','1','ri-checkbox-circle-line')}${item('高优先级问题单','调测失败，需服务经理确认','4','ri-error-warning-line')}</section>`},
customer:{title:'客户拜访',html:`<section class="card"><div class="head"><h2>今日拜访计划</h2><a data-action="visit">新建</a></div>${item('Riyadh Telecom CTO','14:00，GPS+WiFi 签到','', 'ri-user-location-line')}${item('Saudi Energy IT部','16:30，商机跟进','', 'ri-user-location-line')}${item('Dubai Gov Cloud','远程会议，验收沟通','', 'ri-time-line')}</section><section class="card"><div class="head"><h2>客户资料</h2><a>CRM同步</a></div>${item('Riyadh Telecom','联系人 12 / 历史订单 8 / 服务记录 24','', 'ri-building-2-line')}${item('Dubai Gov Cloud','合同 3 / 在交付项目 2','', 'ri-building-2-line')}</section><section class="card"><div class="head"><h2>拜访记录</h2></div><div class="form"><div class="field"><label>拜访主题</label><input class="input" value="5G Core 扩容沟通"></div><div class="field"><label>纪要</label><textarea class="textarea">客户关注验收周期与扩容报价，需补充方案。</textarea></div><button class="btn" data-action="submitVisit">提交纪要</button></div></section>`},
project:{title:'项目交付',html:`<section class="card"><div class="head"><h2>我的项目</h2><a>筛选</a></div>${projectCard('Riyadh 5G Core 交付','安装/调测','82%','S级','green')}${projectCard('Dubai Enterprise Cloud','到货/验收','64%','A级','warn')}${projectCard('South Africa Managed Service','回款/关闭','91%','B级','green')}</section><section class="card"><div class="head"><h2>现场任务</h2><a>阶段</a></div>${tileGrid([['开始任务','执行结果/照片上传','ri-play-circle-line','startTask'],['现场验收','电子签名/归档','ri-checkbox-circle-line','acceptance'],['发货跟踪','物流/签收确认','ri-truck-line','order'],['日报生成','自动汇总可编辑','ri-file-list-3-line','daily']])}</section>`},
issue:{title:'问题闭环',html:`<section class="card"><div class="head"><h2>问题概览</h2><a>风险矩阵</a></div><div class="metrics"><div class="metric"><span>待处理</span><b>12</b><em style="color:#ff3141">高 3</em></div><div class="metric"><span>处理中</span><b>18</b><em>正常</em></div><div class="metric"><span>待确认</span><b>6</b><em style="color:#ff8f1f">客户确认</em></div></div></section><section class="card"><div class="head"><h2>问题单</h2><a data-action="newIssue">新建</a></div>${item('安装规范偏差','高优先级，已派给工程师','3','ri-error-warning-line')}${item('客户需求变更','影响范围待评估','1','ri-edit-box-line')}${item('软件版本兼容','服务经理处理中','', 'ri-settings-3-line')}</section><section class="card"><div class="head"><h2>新建问题</h2></div><div class="form"><div class="field"><label>问题类型</label><input class="input" value="安装 / 调测"></div><div class="field"><label>描述</label><textarea class="textarea">现场发现配置与客户需求不一致，需评估变更。</textarea></div><button class="btn" data-action="submitIssue">提交并派单</button></div></section>`},
doc:{title:'资料中心',html:`<section class="card"><div class="head"><h2>项目文档</h2><a>离线缓存</a></div>${item('合同与 PO 信息','最新版，权限可见','', 'ri-file-shield-2-line')}${item('实施方案 / 图纸','已缓存 18 个文件','', 'ri-file-list-3-line')}${item('验收标准与测试报告','待补 2 项','2', 'ri-checkbox-circle-line')}</section><section class="card"><div class="head"><h2>日报 / 周报</h2><a data-action="daily">生成</a></div>${item('今日日报','自动填充任务、问题、风险','', 'ri-file-list-3-line')}${item('本周周报','汇总 5 天现场数据','', 'ri-calendar-check-line')}</section><section class="card"><div class="head"><h2>安全与同步</h2></div>${item('本地 AES-256 加密','离线数据安全存储','', 'ri-lock-2-line')}${item('同步日志','5 条待同步，0 条冲突','5', 'ri-loop-right-line')}</section>`}
};
function quick(t,i,a){return `<div class="q" data-action="${a}"><i class="${i}"></i><span>${t}</span></div>`}
function item(t,s,b,i){return `<div class="item" data-action="detail" data-title="${t}" data-sub="${s}"><div class="ico"><i class="${i}"></i></div><div><div class="title">${t}</div><div class="sub">${s}</div></div>${b?`<div class="badge">${b}</div>`:'<i class="ri-arrow-right-s-line"></i>'}</div>`}
function projectCard(n,stage,p,tag,color){return `<div class="project" data-action="project" data-title="${n}" data-sub="${stage} · 当前进度 ${p}"><div class="project-top"><h3>${n}</h3><span class="tag ${color}">${tag}</span></div><div class="sub">${stage} · 关键里程碑 3 天后到期</div><div class="progress"><i style="width:${p}"></i></div><div class="sub">整体进度 ${p}</div></div>`}
function tileGrid(arr){return `<div class="grid2">${arr.map(x=>`<div class="tile" data-action="${x[3]}" data-title="${x[0]}" data-sub="${x[1]}"><i class="${x[2]}"></i><b>${x[0]}</b><span>${x[1]}</span></div>`).join('')}</div>`}
function render(tab){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));pageTitle.textContent=pages[tab].title;content.innerHTML=pages[tab].html}
function toast(msg){document.querySelector('.toast')?.remove();const el=document.createElement('div');el.className='toast';el.textContent=msg;document.querySelector('.phone').appendChild(el);setTimeout(()=>el.remove(),1800)}
function actionButtons(actions){return `<div class="actions ${actions.length===3?'three':''}">${actions.map(a=>`<button class="${a.primary?'mini-btn primary':'mini-btn'}" data-action="${a.action}">${a.text}</button>`).join('')}</div>`}
function timeline(items){return `<div class="detail-section"><h4>处理流</h4><div class="timeline">${items.map(x=>`<div><i></i><span>${x}</span></div>`).join('')}</div></div>`}
function sheet(title,sub,rows=[['来源','iSales / CRM'],['状态','已同步'],['离线','可用']],actions=[{text:'关闭',action:'close'},{text:'进入详情',action:'open-detail',primary:true}],extra=''){
  document.querySelector('.mask')?.remove();
  const m=document.createElement('div');
  m.className='mask bottom';
  m.innerHTML=`<div class="sheet"><h3>${title}</h3><p>${sub||'查看详情并继续处理。'}</p><div class="rows">${rows.map(r=>`<div><span>${r[0]}</span><b>${r[1]}</b></div>`).join('')}</div>${extra}${actionButtons(actions)}</div>`;
  document.querySelector('.phone').appendChild(m)
}
let currentTopMoreActions=[];
function topActions(list=[]){
  currentTopMoreActions=list.length>3?list.slice(2):[];
  const visible=list.length>3?[...list.slice(0,2),{text:'⋯',action:'page-top-more',more:true}]:list;
  return visible.length?`<div class="bottom-actions">${visible.map(a=>`<button class="${a.primary?'primary':''} ${a.more?'more':''}" data-action="${a.action}">${a.text}</button>`).join('')}</div>`:'';
}
function openPage(titleText,body,actionList=[]){
  document.querySelector('.page-view')?.remove();
  const page=document.createElement('div');
  page.className='page-view';
  page.innerHTML=`<div class="top"><div class="safe"></div><div class="nav"><button data-action="page-back">‹</button><h1>${titleText}</h1><button data-action="page-more">⋯</button></div></div><main class="content">${body}</main>${topActions(actionList)}`;
  document.querySelector('.phone').appendChild(page);
}
function detailPage(kind,title,sub){
  const commonRows={project:[['合同号','CT-2026-RYD-015'],['客户','Riyadh Telecom'],['阶段','安装/调测'],['进度','82%']],visit:[['客户','Riyadh Telecom'],['计划时间','今日 14:00'],['签到方式','GPS + WiFi'],['关联商机','5G Core 扩容']],issue:[['等级','高'],['处理人','服务经理'],['状态','处理中'],['SLA','剩余 6 小时']],acceptance:[['验收单','ACC-20260530-08'],['项目','Dubai Enterprise Cloud'],['签字','客户待签'],['归档','未完成']],doc:[['版本','最新版'],['权限','可查看/下载'],['离线','已缓存'],['水印','已开启']],order:[['订单号','SO-20260530-188'],['状态','运输中'],['预计到货','2026-06-05'],['签收','待客户确认']],daily:[['日期','今日'],['状态','草稿'],['自动汇总','已完成'],['审批','待提交']],quote:[['报价版本','V3'],['折扣','待审批'],['有效期','7 天'],['客户','Riyadh Telecom']]};
  const rows=commonRows[kind]||[['来源','iSales / CRM'],['状态','已同步']];

function actionSheet(title,actions,placement='top'){
  document.querySelector('.mask')?.remove();
  const m=document.createElement('div');m.className='mask menu';
  m.innerHTML=`<div class="float-menu ${placement}"><h3>${title}</h3><div class="action-list">${actions.map(a=>`<button data-action="${a.action}">${a.text}</button>`).join('')}</div></div>`;
  document.querySelector('.phone').appendChild(m);
}
function confirmDialog(title,sub,okAction){
  document.querySelector('.mask')?.remove();
  const m=document.createElement('div');m.className='mask';
  m.innerHTML=`<div class="confirm-box"><h3>${title}</h3><p>${sub}</p><div class="actions"><button class="btn ghost" data-action="close">取消</button><button class="btn" data-action="${okAction}">确认</button></div></div>`;
  document.querySelector('.phone').appendChild(m);
}

content.addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(!el)return;const a=el.dataset.action;if(a==='switch'){render(el.dataset.target);return}if(a==='checkin'||a==='visit'){detailPage('visit',el.dataset.title||el.textContent.trim(),el.dataset.sub||'客户拜访现场流程');return}if(a==='newIssue'){detailPage('issue','新建问题单','拍照、语音、定位并派单闭环');return}if(a==='acceptance'){detailPage('acceptance',el.dataset.title||'现场验收',el.dataset.sub||'验收清单、客户签字、自动归档');return}if(a==='daily'){detailPage('daily',el.dataset.title||'日报/周报',el.dataset.sub||'自动汇总，可编辑后提交');return}if(a==='quote'){detailPage('quote','报价确认','查看报价、申请折扣并同步 CRM');return}if(a==='order'){detailPage('order','订单与发货',el.dataset.sub||'物流跟踪、签收确认、异常上报');return}if(a==='docs'){detailPage('doc','资料中心','文档预览、离线缓存和权限留痕');return}if(a==='startTask'){detailPage('project','开始现场任务',el.dataset.sub||'执行任务并上传结果');return}if(a==='submitVisit'){confirmDialog('提交拜访纪要','提交后将同步客户、项目与商机记录。','confirm-visit');return}if(a==='submitIssue'){confirmDialog('提交问题单','问题单将派给服务经理，并通知铁三角成员。','confirm-issue');return}if(a==='project'){detailPage('project',el.dataset.title,el.dataset.sub);return}if(a==='detail'){const text=(el.dataset.title||'');const kind=text.includes('验收')?'acceptance':text.includes('问题')||text.includes('风险')?'issue':text.includes('资料')||text.includes('文档')?'doc':text.includes('拜访')?'visit':'default';detailPage(kind,el.dataset.title,el.dataset.sub);return}if(a==='search'){toast('支持项目、客户、合同、订单、问题单搜索')}});
document.querySelector('.phone').addEventListener('click',e=>{const a=e.target.closest('[data-action]')?.dataset.action;if(a==='page-back'){document.querySelector('.page-view')?.remove();return}if(a==='page-top-more'){actionSheet('更多操作',currentTopMoreActions,'actionbar');return}if(a==='page-more'){actionSheet('更多操作',[{text:'刷新数据',action:'refresh-data'},{text:'离线缓存',action:'cache-doc'},{text:'分享给铁三角',action:'share-doc'}],'top');return}if(a==='close'){document.querySelector('.mask')?.remove();return}const messages={ 'open-detail':'已进入详情页','show-milestone':'已打开里程碑视图','update-progress':'进度已更新并同步','report-risk':'风险已上报并通知铁三角','do-checkin':'签到成功，已写入客户拜访记录','write-minutes':'已打开拜访纪要编辑','new-opportunity':'已创建商机草稿','assign-issue':'已打开转派人员选择','append-log':'处理记录已补充','close-issue':'问题已提交客户确认关闭','check-list':'已打开验收检查清单','customer-sign':'已进入客户电子签名','gen-cert':'验收证书已生成草稿','preview-doc':'已打开文档预览','cache-doc':'文档已加入离线缓存','share-doc':'已生成受控分享链接','track-order':'已打开物流轨迹','receive-order':'已进入现场签收','preview-daily':'已生成日报预览','edit-daily':'已进入日报编辑','submit-daily':'日报已提交审批','preview-quote':'已打开报价单','request-discount':'折扣审批已发起','send-quote':'报价已生成客户分享链接','page-primary':'操作已完成并同步','page-secondary':'备注已添加','confirm-visit':'拜访纪要已提交并同步','confirm-issue':'问题单已创建并派单','refresh-data':'数据已刷新'};if(messages[a]){document.querySelector('.mask')?.remove();toast(messages[a]);return}if(e.target.classList.contains('mask'))e.target.remove()});
